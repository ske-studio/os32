# ============================================================================
#  OS32 パッケージ定義 (package_defs.yaml)
#
#  mkpkg.py が読み込み、各パッケージの .PKG ファイルを生成する。
#
#  各パッケージ:
#    type: package (通常) / boot (ブートセクタ直接書込み)
#    version: パッケージバージョン (整数)
#    lzss: true/false (LZSS圧縮の有無)
#    files: ファイルリスト (host: ビルドパス, guest: インストール先パス)
# ============================================================================

# --- ブートパッケージ (特殊: ブートセクタ直接書込み) ---
boot:
  type: boot
  version: 1
  lzss: false
  files:
    - host: boot/boot_hdd.bin
      guest: /boot/boot_hdd.bin
    - host: boot/loader_hdd.bin
      guest: /boot/loader_hdd.bin
    - host: kernel.bin
      guest: /boot/kernel.bin

# --- 最小パッケージ ---
minimal:
  type: package
  version: 1
  lzss: true
  files:
    - host: programs/shell.bin
      guest: /sys/shell.bin
    - host: unicode.bin
      guest: /sys/unicode.bin
    - host: programs/more.bin
      guest: /bin/more.bin
    - host: programs/grep.bin
      guest: /bin/grep.bin
    - host: programs/find.bin
      guest: /bin/find.bin
    - host: programs/sort.bin
      guest: /bin/sort.bin
    - host: programs/head.bin
      guest: /bin/head.bin
    - host: programs/tail.bin
      guest: /bin/tail.bin
    - host: programs/wc.bin
      guest: /bin/wc.bin
    - host: programs/tee.bin
      guest: /bin/tee.bin
    - host: programs/touch.bin
      guest: /bin/touch.bin
    - host: programs/hexdump.bin
      guest: /bin/hexdump.bin
    - host: programs/sleep.bin
      guest: /bin/sleep.bin
    - host: programs/lzss.bin
      guest: /bin/lzss.bin
    - host: programs/sndctl.bin
      guest: /bin/sndctl.bin
    - host: programs/install.bin
      guest: /sbin/install.bin
    - host: programs/cdinst.bin
      guest: /sbin/cdinst.bin

# --- 標準パッケージ (差分) ---
normal:
  type: package
  version: 1
  lzss: true
  files:
    - host: programs/edit.bin
      guest: /usr/bin/edit.bin
    - host: programs/man.bin
      guest: /bin/man.bin
    - host: programs/diff.bin
      guest: /bin/diff.bin
    - host: programs/du.bin
      guest: /bin/du.bin
    - host: programs/cal.bin
      guest: /bin/cal.bin
    - host: "docs/manpages/*.1"
      guest: /usr/man/

# --- フルパッケージ (差分) ---
full:
  type: package
  version: 1
  lzss: true
  files:
    - host: programs/gfx_demo.bin
      guest: /usr/bin/gfx_demo.bin
    - host: programs/demo1.bin
      guest: /usr/bin/demo1.bin
    - host: programs/ekakiuta.bin
      guest: /usr/bin/ekakiuta.bin
    - host: programs/vbzview.bin
      guest: /usr/bin/vbzview.bin
    - host: programs/vdpview.bin
      guest: /usr/bin/vdpview.bin
    - host: programs/raster.bin
      guest: /usr/bin/raster.bin
    - host: programs/spr_test.bin
      guest: /usr/bin/spr_test.bin
    - host: programs/hrview.bin
      guest: /usr/bin/hrview.bin
    - host: programs/mdview.bin
      guest: /usr/bin/mdview.bin
    - host: programs/sndtest.bin
      guest: /usr/bin/sndtest.bin

# --- デバッグパッケージ ---
debug:
  type: package
  version: 1
  lzss: true
  files:
    - host: programs/hello.bin
      guest: /bin/hello.bin
    - host: programs/crash.bin
      guest: /sbin/crash.bin
    - host: programs/bench.bin
      guest: /sbin/bench.bin
    - host: programs/restest.bin
      guest: /sbin/restest.bin
    - host: programs/libc_test.bin
      guest: /bin/libc_test.bin
    - host: programs/test2.bin
      guest: /bin/test2.bin
    - host: programs/test3.bin
      guest: /bin/test3.bin
    - host: programs/test4.bin
      guest: /bin/test4.bin
    - host: programs/stat_t.bin
      guest: /bin/stat_t.bin
    - host: programs/args.bin
      guest: /bin/args.bin
    - host: programs/nop.bin
      guest: /bin/nop.bin
    - host: programs/fep_test.bin
      guest: /usr/bin/fep_test.bin

# --- 追加データパッケージ ---
append:
  type: package
  version: 1
  lzss: true
  files:
    - host: assets/SKK.LZS
      guest: /data/skk.lzs
    - host: assets/fep.dic
      guest: /sys/fep.dic
    - host: "assets/images/*.vbz"
      guest: /data/images/
