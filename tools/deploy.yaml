# ============================================================================
#  OS32 デプロイ定義ファイル (deploy.yaml)
#
#  nhd_deploy.py sync  — この定義に基づき NHD を一括構築 (フルデプロイ)
#  nhd_deploy.py push  — この定義を参照しシリアル経由で転送 (ホットデプロイ)
#
#  host: ホスト側パス (プロジェクトルートからの相対パス)
#  guest: ゲスト側 ext2 配置パス
#  type: file (デフォルト) / glob
#  tags: フィルタ用タグ (任意, --tag オプション用)
# ============================================================================

# ブート領域 (ext2外、NHD直接書き込み)
boot:
  kernel: kernel.bin
  loader: boot/loader_hdd.bin

# ext2 ファイルシステム
filesystem:
  # ゲスト側ディレクトリ構造 (自動作成)
  directories:
    - /sys
    - /bin
    - /sbin
    - /usr
    - /usr/bin
    - /usr/man
    - /data
    - /etc
    - /home
    - /home/user
    - /tmp

  # ファイルデプロイ定義
  files:
    # --- カーネルデータ ---
    - host: unicode.bin
      guest: /sys/unicode.bin
      tags: [core]

    # --- シェル (カーネルは /shell をロードする: config.h SYS_SHELL_BIN) ---
    - host: programs/shell.bin
      guest: /sys/shell.bin
      tags: [core]

    # --- システム管理プログラム → /sbin/ ---
    - host: programs/install.bin
      guest: /sbin/
      tags: [programs]
    - host: programs/crash.bin
      guest: /sbin/
      tags: [programs]
    - host: programs/bench.bin
      guest: /sbin/
      tags: [programs]
    - host: programs/restest.bin
      guest: /sbin/
      tags: [programs]
    - host: programs/cdinst.bin
      guest: /sbin/
      tags: [programs]

    # --- ユーザー・デモプログラム → /usr/bin/ ---
    - host: programs/edit.bin
      guest: /usr/bin/
      tags: [programs]
    - host: programs/gfx_demo.bin
      guest: /usr/bin/
      tags: [programs]
    - host: programs/demo1.bin
      guest: /usr/bin/
      tags: [programs]
    - host: programs/ekakiuta.bin
      guest: /usr/bin/
      tags: [programs]
    - host: programs/vbzview.bin
      guest: /usr/bin/
      tags: [programs]
    - host: programs/hrview.bin
      guest: /usr/bin/
      tags: [programs]
    - host: programs/vdpview.bin
      guest: /usr/bin/
      tags: [programs]
    - host: programs/spr_test.bin
      guest: /usr/bin/
      tags: [programs]
    - host: programs/raster.bin
      guest: /usr/bin/
      tags: [programs]
    - host: programs/fep_test.bin
      guest: /usr/bin/
      tags: [programs]
    - host: programs/mdview.bin
      guest: /usr/bin/
      tags: [programs]

    # --- 一般プログラム → /bin/ ---
    - host: "programs/*.bin"
      guest: /bin/
      type: glob
      exclude:
        - shell.bin
        - install.bin
        - cdinst.bin
        - crash.bin
        - bench.bin
        - restest.bin
        - edit.bin
        - gfx_demo.bin
        - demo1.bin
        - ekakiuta.bin
        - vbzview.bin
        - hrview.bin
        - vdpview.bin
        - spr_test.bin
        - raster.bin
        - fep_test.bin
        - mdview.bin
      tags: [programs]

    # --- マニュアルページ → /usr/man/ ---
    - host: "docs/manpages/*.1"
      guest: /usr/man/
      type: glob
      tags: [docs]

    # --- SKK辞書 ---
    - host: assets/SKK.LZS
      guest: /data/skk.lzs
      tags: [data]

    # --- FEP辞書 ---
    - host: assets/fep.dic
      guest: /sys/fep.dic
      tags: [data]

    # --- テスト用ファイル ---
    - host: programs/test.txt
      guest: /home/user/test.txt
      tags: [test]

    - host: programs/test_utf8.txt
      guest: /home/user/test_utf8.txt
      tags: [test]

    - host: programs/test_script.bat
      guest: /home/user/test_script.bat
      tags: [test]
